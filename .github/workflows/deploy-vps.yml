name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          VPS_HOST="$(printf '%s' "$VPS_HOST" | tr -d '\r\n[:space:]')"
          VPS_PORT="$(printf '%s' "${VPS_PORT:-22}" | tr -d '\r\n[:space:]')"
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload project
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          VPS_HOST="$(printf '%s' "$VPS_HOST" | tr -d '\r\n[:space:]')"
          VPS_PORT="$(printf '%s' "${VPS_PORT:-22}" | tr -d '\r\n[:space:]')"
          VPS_USER="$(printf '%s' "$VPS_USER" | tr -d '\r\n[:space:]')"
          ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$VPS_USER@$VPS_HOST" "mkdir -p /opt/polymarket-agent"

          rsync -az --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".venv" \
            --exclude ".env" \
            --exclude "data" \
            --exclude "__pycache__" \
            --exclude "*.pyc" \
            -e "ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes" \
            ./ "$VPS_USER@$VPS_HOST:/opt/polymarket-agent/"

      - name: Install and restart service
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          VPS_HOST="$(printf '%s' "$VPS_HOST" | tr -d '\r\n[:space:]')"
          VPS_PORT="$(printf '%s' "${VPS_PORT:-22}" | tr -d '\r\n[:space:]')"
          VPS_USER="$(printf '%s' "$VPS_USER" | tr -d '\r\n[:space:]')"
          ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$VPS_USER@$VPS_HOST" <<'EOF'
            set -e
            cd /opt/polymarket-agent
            python3 -m venv .venv
            .venv/bin/pip install -r requirements.txt
            if [ "$(id -u)" -eq 0 ]; then
              cp deploy/polymarket-bot.service.example /etc/systemd/system/polymarket-bot.service
              systemctl daemon-reload
              systemctl restart polymarket-bot
              systemctl --no-pager --lines=30 status polymarket-bot
            else
              sudo cp deploy/polymarket-bot.service.example /etc/systemd/system/polymarket-bot.service
              sudo systemctl daemon-reload
              sudo systemctl restart polymarket-bot
              sudo systemctl --no-pager --lines=30 status polymarket-bot
            fi
          EOF
