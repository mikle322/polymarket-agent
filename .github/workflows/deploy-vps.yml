name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.VPS_PORT || '22' }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload project
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".venv" \
            --exclude ".env" \
            --exclude "data" \
            --exclude "__pycache__" \
            --exclude "*.pyc" \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || '22' }}" \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/polymarket-agent/"

      - name: Install and restart service
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.VPS_PORT || '22' }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" <<'EOF'
            set -e
            cd /opt/polymarket-agent
            python3 -m venv .venv
            .venv/bin/pip install -r requirements.txt
            if [ "$(id -u)" -eq 0 ]; then
              systemctl restart polymarket-bot
              systemctl --no-pager --lines=30 status polymarket-bot
            else
              sudo systemctl restart polymarket-bot
              sudo systemctl --no-pager --lines=30 status polymarket-bot
            fi
          EOF
